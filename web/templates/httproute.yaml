---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "web.name" . }}-httproute
  labels:
    {{- include "web.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: system-traefik-gateway
      namespace: system-traefik
  {{- if .Values.hostname }}
  hostnames:
    - {{ .Values.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.path | quote }}
      backendRefs:
        - name: {{ include "web.name" . }}-service
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: {{ include "web.name" . }}-backend-tls-policy
  labels:
    {{- include "web.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: "" # must be blank
      kind: Service
      name: {{ include "web.name" . }}-service
  validation:
    hostname: {{ printf "%s-service.%s.svc.cluster.local" (include "web.name" .) .Release.Namespace | quote }}
    caCertificateRefs:
      - group: "" # must be blank
        name: system-selfsigned-ca-bundle
        kind: ConfigMap
