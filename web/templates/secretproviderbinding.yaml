{{- range $index, $secret := .Values.secrets }}
{{- $bindingName := required (printf "secrets[%d].bindingName is required" $index) $secret.bindingName }}
{{- $providerName := required (printf "secrets[%d].providerName is required" $index) $secret.providerName }}
{{- $mountPath := required (printf "secrets[%d].mountPath is required" $index) $secret.mountPath }}
{{- if not $secret.items }}
{{- fail (printf "secrets[%d].items must contain at least one item" $index) }}
{{- end }}
---
apiVersion: secrets.podplane.dev/v1beta1
kind: SecretProviderBinding
metadata:
  name: {{ $bindingName }}
  labels:
    {{- include "web.labels" $ | nindent 4 }}
spec:
  providerName: {{ $providerName | quote }}
  mountPath: {{ $mountPath | quote }}
  items:
    {{- range $itemIndex, $item := $secret.items }}
    {{- $key := required (printf "secrets[%d].items[%d].key is required" $index $itemIndex) $item.key }}
    {{- $path := default $key $item.path }}
    {{- if or (eq $path "") (eq $path ".") (eq $path "..") (hasPrefix "/" $path) (hasPrefix "../" $path) (contains "/../" $path) (hasSuffix "/.." $path) (contains "//" $path) }}
    {{- fail (printf "secrets[%d].items[%d].path must be a non-empty clean relative path without '..' elements" $index $itemIndex) }}
    {{- end }}
    - key: {{ $key | quote }}
      {{- with $item.path }}
      path: {{ . | quote }}
      {{- end }}
    {{- end }}
  syncToKubernetesSecrets:
    {{- range $sync := $secret.syncToKubernetesSecrets }}
    - secretName: {{ required (printf "secrets[%d].syncToKubernetesSecrets[].secretName is required" $index) $sync.secretName | quote }}
      type: {{ default "Opaque" $sync.type | quote }}
      {{- with $sync.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $sync.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      data:
        {{- range $data := $sync.data }}
        - fromKey: {{ required (printf "secrets[%d].syncToKubernetesSecrets[].data[].fromKey is required" $index) $data.fromKey | quote }}
          key: {{ required (printf "secrets[%d].syncToKubernetesSecrets[].data[].key is required" $index) $data.key | quote }}
        {{- end }}
    {{- else }} []
    {{- end }}
{{- end }}
